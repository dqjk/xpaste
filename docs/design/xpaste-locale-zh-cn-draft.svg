    <rect x="420" y="537" width="87" height="34" rx="8" fill="#eef4ff" stroke="#cfe0ff" /><text x="463.5" y="558" fill="#1d4ed8">◉  预览</text>
    <rect x="514" y="537" width="70" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0" /><text x="549" y="558" fill="#111827">↓  保存</text>
    <rect x="778" y="413" width="74" height="34" rx="8" fill="#eef4ff" stroke="#cfe0ff" /><text x="815" y="434" fill="#1d4ed8">↗  打开</text>
